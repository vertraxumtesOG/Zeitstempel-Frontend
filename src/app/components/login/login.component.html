<div class="login-wrap">
  <div class="login-box">
    <div class="top">
      <div class="brand">Zeiterfassung</div>
    </div>

    <p class="subtitle">Melde dich mit deiner Chip‑UID an</p>

    <form
      (ngSubmit)="handleLogin()"
      class="form"
    >
      <input
        type="text"
        [ngModel]="uid()"
        (ngModelChange)="uid.set($event)"
        name="uid"
        placeholder="Chip‑UID"
        class="input"
        (keyup.enter)="handleLogin()"
        inputmode="numeric"
        aria-label="Chip‑UID eingeben"
      />

      <sh-button
        type="submit"
        variant="primary"
        size="lg"
        [fullWidth]="true"
        [disabled]="!uid()"
      >
        Continue
      </sh-button>
    </form>

    @if (error()) {
      <div class="error">{{ error() }}</div>
    }
  </div>
</div>
