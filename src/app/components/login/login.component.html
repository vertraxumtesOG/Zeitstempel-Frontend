<div class="login-container">
  <div class="login-card">
    <h1 class="login-title"><i class="pi pi-lock"></i> Zeiterfassung</h1>
    <p class="login-subtitle">Melde dich mit deiner Chip-UID an</p>

    <form (ngSubmit)="handleLogin()" class="login-form">
      <div class="form-group">
        <input
          type="text"
          [(ngModel)]="uid"
          name="uid"
          placeholder="Chip-UID eingeben"
          class="login-input"
          (keyup.enter)="handleLogin()"
          inputmode="numeric"
          aria-label="Chip-UID eingeben"
        />
      </div>

      <button type="submit" class="login-button" [disabled]="!uid()">
        <i class="pi pi-sign-in"></i> Anmelden
      </button>
    </form>

    @if (error()) {
      <div class="error-message">
        <i class="pi pi-exclamation-circle"></i> {{ error() }}
      </div>
    }

    <div class="demo-info">
      <p><i class="pi pi-info-circle"></i> Demo-UIDs: <strong>12345</strong> oder <strong>54321</strong></p>
    </div>
  </div>
</div>
