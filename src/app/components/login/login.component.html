<div class="login-wrap">
  <div class="login-box">
    <div class="top">
      <div class="brand">Zeiterfassung</div>
    </div>

    <p class="subtitle">Melde dich mit deiner Chip‑UID an</p>

    <form (ngSubmit)="handleLogin()" class="form">
      <input
        type="text"
        [ngModel]="uid()"
        (ngModelChange)="uid.set($event)"
        name="uid"
        placeholder="Chip‑UID"
        class="input"
        (keyup.enter)="handleLogin()"
        inputmode="numeric"
        aria-label="Chip‑UID eingeben"
      />

      <button 
        type="submit" 
        class="btn btn-wide" 
        [disabled]="!uid()"
        >
        Continue
      </button>
    </form>

    @if (error()) {
      <div class="error">{{ error() }}</div>
    }
  </div>
</div>
