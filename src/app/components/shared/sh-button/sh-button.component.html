<button
  class="sh-btn"
  [class.primary]="variant === 'primary'"
  [class.danger]="variant === 'danger'"
  [class.outline]="variant === 'outline'"
  [class.ghost]="variant === 'ghost'"
  [class.sm]="size === 'sm'"
  [class.lg]="size === 'lg'"
  [class.full]="fullWidth"
  [disabled]="disabled"
  [attr.type]="type"
  (click)="onClick($event)"
>
  <ng-content></ng-content>
</button>
