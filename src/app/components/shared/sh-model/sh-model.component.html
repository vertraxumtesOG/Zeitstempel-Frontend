@if (isOpen) {
  <div 
    class="modal-overlay" 
    (click)="onOverlayClick($event)"
    >
  </div>
  <div class="modal-dialog">
    <div class="modal-header">
      <h2><i class="pi pi-window-maximize"></i> {{ title }}</h2>
      <button class="modal-close" (click)="onClose()" aria-label="Modal schließen">
        <i class="pi pi-times"></i>
      </button>
    </div>

    <div class="modal-content">
      <ng-content></ng-content>
    </div>
  </div>
}
